<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JeroStore - Asamblea Jerovia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rosa-principal: #f8bbd0;
    --rosa-fuerte: #e91e63;
    --fondo: #fcfcfc;
    --texto: #333;
    --oro: #d4af37;
  }

  body { font-family: 'Montserrat', sans-serif; background: var(--fondo); margin: 0; padding-bottom: 60px; color: var(--texto); }
  
  /* Header Premium */
  header { background: white; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
  h1 { font-family: 'Playfair Display', serif; color: var(--texto); margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
  .user-badge { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.85rem; }
  .coins-display { background: #fdfaf3; color: var(--oro); padding: 5px 12px; border-radius: 20px; border: 1px solid #f7eecf; font-weight: 700; display: none; }

  /* Login / Guest Modal */
  .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--fondo); display: flex; justify-content: center; align-items: center; z-index: 200; }
  .auth-card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); width: 85%; max-width: 320px; text-align: center; }
  .auth-title { font-family: 'Playfair Display'; font-size: 1.8rem; margin: 0 0 5px 0; }
  .auth-subtitle { color: #888; font-size: 0.8rem; margin-bottom: 25px; }
  input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 12px; box-sizing: border-box; font-family: 'Montserrat'; background: #fafafa; outline: none; transition: 0.2s; }
  input:focus { border-color: var(--rosa-principal); background: white; }
  .btn-primary { background: var(--texto); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; font-family: 'Montserrat'; }
  .btn-primary:hover { background: var(--rosa-fuerte); }
  .btn-guest { background: none; border: none; color: #888; font-size: 0.8rem; text-decoration: underline; margin-top: 15px; cursor: pointer; }

  /* Panel Admin */
  .admin-panel { background: #fff; margin: 20px auto; max-width: 900px; padding: 20px; border-radius: 15px; border: 1px solid #eee; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
  .admin-panel h3 { font-family: 'Playfair Display'; color: var(--rosa-fuerte); margin-top: 0; }
  .admin-controls { display: flex; flex-wrap: wrap; gap: 10px; }
  .switch-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #ccc; background: white; color: #555; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.2s; }
  .switch-btn.active { background: var(--texto); color: white; border-color: var(--texto); }

  /* E-Commerce Grid */
  .store-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
  
  .product-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.04); position: relative; display: flex; flex-direction: column; transition: 0.3s; border: 1px solid #f5f5f5; }
  .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-color: var(--rosa-principal); }
  
  /* Gradiente decorativo superior de la tarjeta */
  .card-art { height: 8px; background: linear-gradient(90deg, var(--rosa-principal), #ffd6a5); }
  
  .card-content { padding: 20px 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .product-title { font-family: 'Playfair Display'; font-weight: 600; font-size: 1.1rem; color: var(--texto); line-height: 1.2; }
  
  /* Hover Descripcion */
  .desc-overlay { position: absolute; top: 8px; left: 0; width: 100%; height: calc(100% - 60px); background: rgba(255,255,255,0.95); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; text-align: center; font-size: 0.75rem; font-weight: 500; color: #444; opacity: 0; transition: 0.3s; pointer-events: none; line-height: 1.5; }
  .product-card:hover .desc-overlay { opacity: 1; }

  .card-footer { padding: 15px; border-top: 1px solid #f9f9f9; }
  .btn-buy { width: 100%; background: #f4f4f4; border: none; padding: 12px; border-radius: 10px; font-family: 'Montserrat'; font-weight: 700; font-size: 0.9rem; color: var(--texto); cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 5px; }
  .product-card:hover .btn-buy { background: var(--texto); color: white; }

  /* Modales Genéricos */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(3px); display: none; justify-content: center; align-items: center; z-index: 300; }
  .modal-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; }
  .modal-box h2 { font-family: 'Playfair Display'; margin-top: 0; font-size: 1.3rem; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #666; margin-bottom: 5px; }

</style>
</head>
<body>

<header>
  <h1>JeroStore</h1>
  <div class="user-badge">
    <span id="headerName">Invitado</span>
    <div class="coins-display" id="headerCoins"><span id="coinAmount">0</span> ✦</div>
  </div>
</header>

<div class="auth-overlay" id="authScreen">
  <div class="auth-card">
    <h2 class="auth-title">Bienvenida</h2>
    <p class="auth-subtitle">Ingresá tus credenciales para canjear</p>
    <input type="text" id="loginUser" placeholder="Nombre">
    <input type="password" id="loginPass" placeholder="Contraseña">
    <button class="btn-primary" onclick="login()">Ingresar</button>
    <button class="btn-guest" onclick="continueAsGuest()">Continuar como invitado</button>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
  <h3>Panel de Control (Jeroviana)</h3>
  <div class="admin-controls">
    <button class="switch-btn active" id="btnNorm" onclick="setMode('normal')">Modo: Reunión Regular</button>
    <button class="switch-btn" id="btnPub" onclick="setMode('publica')">Modo: Ceremonia Pública</button>
    <button class="switch-btn" id="btnDinamica" onclick="toggleDinamica()">Activar: Dinámica</button>
    <button class="switch-btn" id="btnPanchos" onclick="togglePanchos()">Activar: Panchos</button>
    <div style="flex-basis: 100%; height: 10px;"></div>
    <button class="switch-btn" style="background: var(--oro); color: white; border:none;" onclick="alert('Funcionalidad de Google Script: Se sumarán los JeroCoins al podio actual y se actualizarán los meses.')">✨ Consolidar Podio del Mes</button>
  </div>
</div>

<div class="store-container">
  <div class="grid" id="storeGrid"></div>
</div>

<div class="modal-overlay" id="loginRequestModal">
  <div class="modal-box text-center" style="text-align: center;">
    <h2>Inicia Sesión</h2>
    <p style="font-size: 0.85rem; color: #666;">Debes iniciar sesión para poder adquirir este privilegio.</p>
    <input type="text" id="reqUser" placeholder="Nombre">
    <input type="password" id="reqPass" placeholder="Contraseña">
    <button class="btn-primary" onclick="reqLogin()">Ingresar</button>
    <button class="btn-guest" onclick="closeModal('loginRequestModal')">Cancelar</button>
  </div>
</div>

<div class="modal-overlay" id="purchaseModal">
  <div class="modal-box">
    <h2 id="pTitle"></h2>
    <div id="pFields"></div>
    <div id="pUpsell" style="display: none; background: #fafafa; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px dashed #ccc;">
      <label style="font-size: 0.8rem; font-weight: 600;"><input type="checkbox" id="upsellCheck" onchange="toggleUpsellField()"> Deseo que diga algo en específico (+25%)</label>
      <input type="text" id="upsellText" placeholder="Escribe el mensaje..." style="display:none; margin-top: 10px;">
    </div>
    <button class="btn-primary" style="margin-top: 20px;" onclick="confirmPurchase()">Canjear Privilegio</button>
    <button class="btn-guest" style="width: 100%; margin-top: 10px;" onclick="closeModal('purchaseModal')">Cancelar</button>
  </div>
</div>

<script>
// Base de Datos del Catálogo
const CATALOG = [
  { id: 1, name: "Este es mi tema", price: 5, category: 'normal', desc: "Tenés el privilegio a elegir una música que sonará durante la reunión del sábado, en el momento en el que la hermana armonía lo decida.", fields: ['Canción'] },
  { id: 2, name: "Yo organizo", price: 8, category: 'dinamica', desc: "Elegis en que orden participarán las hermanas en la dinámica de este sábado.", fields: [] },
  { id: 3, name: "Momento epico", price: 12, category: 'normal', desc: "Tenés el privilegio a elegir una música que sonará durante la reunión del sábado en el momento de tu preferencia.", fields: ['Canción', 'Momento'] },
  { id: 4, name: "Entrada Triunfal", price: 15, category: 'normal', desc: "Tenés el privilegio a elegir una música que sonará durante la entrada ritualística de la reunión del sábado.", fields: ['Canción'] },
  { id: 5, name: "Salida Triunfal", price: 18, category: 'normal', desc: "Tenés el privilegio a elegir una música que sonará durante la salida ritualística de la reunión del sábado.", fields: ['Canción'] },
  { id: 6, name: "Este tema NO", price: 20, category: 'siempre', desc: "Tenés el privilegio a decidir qué música NO va a sonar este sábado.", fields: ['Canción prohibida'] },
  { id: 7, name: "Mi tema", price: 22, category: 'publica', desc: "Tenés el privilegio a elegir una música que sonará durante la ceremonia pública del sábado, en el momento en el que la hermana armonía lo decida.", fields: ['Canción'] },
  { id: 8, name: "Momento epico", price: 25, category: 'publica', desc: "Tenés el privilegio a elegir una música que sonará durante la ceremonia pública del sábado en el momento de tu preferencia.", fields: ['Canción', 'Momento'] },
  { id: 9, name: "Entrada Triunfal", price: 30, category: 'publica', desc: "Tenés el privilegio a elegir una música que sonará durante la entrada ritualística de la ceremonia pública del sábado.", fields: ['Canción'] },
  { id: 10, name: "Salida epica", price: 35, category: 'publica', desc: "Tenés el privilegio a elegir una música que sonará durante la salida ritualística de la ceremonia pública del sábado.", fields: ['Canción'] },
  { id: 11, name: "Gordichan", price: 40, category: 'publica', desc: "Tenés el privilegio de elegir de dónde compramos los bocaditos y hacer las especificaciones que desees.", fields: ['Lugar', 'Especificaciones'] },
  { id: 12, name: "Insta baddie", price: 45, category: 'siempre', desc: "Tenés el privilegio de que la asamblea te dedique una historia de instagram indicando en qué meses estuviste en el podio y con un mensaje creado por vos.", fields: ['Mensaje'] },
  { id: 13, name: "De chill normal", price: 50, category: 'normal', desc: "Tenés el privilegio de mirar como las hermanas ordenan el templo sentada y relajada, sin tener que hacer nada.", fields: [] },
  { id: 14, name: "Freaky Friday", price: 55, category: 'normal', desc: "Tenés el privilegio de cambiar de cargo con la hermana de tu elección durante este sábado. Esto implica que tendrás las responsabilidades de su cargo y ella tendrá las del tuyo.", fields: ['Con quién querés cambiar'] },
  { id: 15, name: "Baby no", price: 55, category: 'normal', desc: "Tenés el privilegio de negarte al cambio de cargos para el que te eligieron.", fields: [] },
  { id: 16, name: "Don't be shy", price: 65, category: 'publica', desc: "Tenés el privilegió de obligar a hablar a la hermana de tu elección durante una ceremonia pública y pagando un precio extra, podés obligarla a que diga algo en especifico.", fields: ['Nombre de la víctima'], upsell: true },
  { id: 17, name: "Me da wewencha", price: 65, category: 'publica', desc: "Tenés el privilegio de negarte a tu obligación de hablar.", fields: [] },
  { id: 18, name: "RE de chill", price: 70, category: 'publica', desc: "Tenés el privilegio de mirar como las hermanas ordenan el templo sentada y relajada, sin tener que hacer nada.", fields: [] },
  { id: 19, name: "Jeropanchill", price: 75, category: 'panchos', desc: "Tenés el privilegio de mirar como las hermanas ordenan el templo sentada y relajada, sin tener que hacer nada.", fields: [] },
  { id: 20, name: "Mencion de honor presidencial", price: 80, category: 'publica', desc: "Tenés el privilegio de ser mencionada por la Ilustre Preceptora durante el uso de la palabra en una ceremonia pública y pagando un precio extra podés elegir qué dice.", fields: [], upsell: true }
];

let isGuest = true;
let currentUser = null;
let modeBase = 'normal'; // 'normal' o 'publica'
let modeDinamica = false;
let modePanchos = false;
let selectedItem = null;

// Funciones de Autenticación
function login() { processAuth(document.getElementById('loginUser').value, document.getElementById('loginPass').value); }
function reqLogin() { processAuth(document.getElementById('reqUser').value, document.getElementById('reqPass').value); }

function processAuth(u, p) {
    if (!u || !p) { alert("Completá los datos"); return; }
    
    // Cuenta Maestra
    if (u === "Jeroviana" && p === "9102021") {
        document.getElementById('adminPanel').style.display = 'block';
        currentUser = { name: "Jeroviana", coins: 9999 };
    } else {
        // Simulación de respuesta de Google Script
        currentUser = { name: u, coins: 45 }; // Fake data
    }
    
    isGuest = false;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('loginRequestModal').style.display = 'none';
    
    document.getElementById('headerName').innerText = currentUser.name;
    document.getElementById('coinAmount').innerText = currentUser.coins;
    document.getElementById('headerCoins').style.display = 'block';
    
    renderStore();
}

function continueAsGuest() {
    isGuest = true;
    document.getElementById('authScreen').style.display = 'none';
    renderStore();
}

// Renderizado de Tienda
function renderStore() {
    const grid = document.getElementById('storeGrid');
    grid.innerHTML = '';
    
    CATALOG.forEach(item => {
        let show = false;
        if (item.category === 'siempre') show = true;
        if (item.category === modeBase) show = true;
        if (item.category === 'dinamica' && modeDinamica) show = true;
        if (item.category === 'panchos' && modePanchos) show = true;
        
        if (show) {
            grid.innerHTML += `
                <div class="product-card" onclick="handleBuyClick(${item.id})">
                    <div class="card-art"></div>
                    <div class="card-content">
                        <div class="product-title">${item.name}</div>
                    </div>
                    <div class="desc-overlay">${item.desc}</div>
                    <div class="card-footer">
                        <button class="btn-buy">${item.price} ✦</button>
                    </div>
                </div>`;
        }
    });
}

// Panel Jeroviana
function setMode(m) {
    modeBase = m;
    document.getElementById('btnNorm').classList.remove('active');
    document.getElementById('btnPub').classList.remove('active');
    if (m === 'normal') document.getElementById('btnNorm').classList.add('active');
    if (m === 'publica') document.getElementById('btnPub').classList.add('active');
    renderStore();
}
function toggleDinamica() {
    modeDinamica = !modeDinamica;
    document.getElementById('btnDinamica').classList.toggle('active');
    renderStore();
}
function togglePanchos() {
    modePanchos = !modePanchos;
    document.getElementById('btnPanchos').classList.toggle('active');
    renderStore();
}

// Lógica de Canje
function handleBuyClick(id) {
    if (isGuest) {
        document.getElementById('loginRequestModal').style.display = 'flex';
        return;
    }
    
    selectedItem = CATALOG.find(i => i.id === id);
    document.getElementById('pTitle').innerText = selectedItem.name;
    
    const fieldsDiv = document.getElementById('pFields');
    fieldsDiv.innerHTML = '';
    selectedItem.fields.forEach(f => {
        fieldsDiv.innerHTML += `
            <div class="form-group">
                <label>${f}</label>
                <input type="text" id="input_${f.replace(/\s/g, '')}" placeholder="Escribe aquí...">
            </div>`;
    });

    const upsellDiv = document.getElementById('pUpsell');
    if (selectedItem.upsell) {
        upsellDiv.style.display = 'block';
        document.getElementById('upsellCheck').checked = false;
        document.getElementById('upsellText').style.display = 'none';
        document.getElementById('upsellText').value = '';
    } else {
        upsellDiv.style.display = 'none';
    }

    document.getElementById('purchaseModal').style.display = 'flex';
}

function toggleUpsellField() {
    document.getElementById('upsellText').style.display = document.getElementById('upsellCheck').checked ? 'block' : 'none';
}

function confirmPurchase() {
    let finalPrice = selectedItem.price;
    const isUpsell = selectedItem.upsell && document.getElementById('upsellCheck').checked;
    if (isUpsell) finalPrice += (selectedItem.price * 0.25);

    if (currentUser.coins < finalPrice) {
        alert("No tienes suficientes ✦ para este privilegio.");
        return;
    }

    alert(`¡Privilegio adquirido con éxito!\nSimulando envío a base de datos y WhatsApp...`);
    closeModal('purchaseModal');
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// Iniciar app visualmente
renderStore();
</script>
</body>
</html>
